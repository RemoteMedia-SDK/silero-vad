name: Release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.2.0)'
        required: true

jobs:
  release:
    uses: RemoteMedia-SDK/remotemedia-sdk/.github/workflows/build-plugin.yml@main
    with:
      crate-name:   silero-vad-loadable-plugin
      display-name: silero-vad
      tag:          ${{ inputs.tag || github.ref_name }}
    permissions:
      contents: write
