# SileroVAD shipped as a Rust cdylib (Path 3 — hand-rolled,
# standalone). The nodes are defined in this plugin's own src/lib.rs
# and depend ONLY on `remotemedia-plugin-sdk` for the skinny trait
# and type surfaces — `remotemedia-core` is NOT linked.
#
# A consumer references this from a manifest as either:
#
#   "plugins": ["silero-vad@v0.4.3"]
#       (canonical-org shorthand → github.com/RemoteMedia-SDK/silero-vad)
#
#   "plugins": ["./plugins/libsilero_vad_loadable_plugin.so"]
#       (local path — for development before the release flow exists)
#
# The resolver fetches this file from raw.githubusercontent.com first
# (cheap, validates the spec + lists node types), then falls through to
# `release-manifest.json` for the actual platform-specific binary.
#
# Both nodes use the multi-output FFI path so the JSON event + audio
# passthrough (+ optional CancelSpeculation control message) all
# cross the dlopen boundary intact.

[plugin]
name        = "silero-vad"
version     = "0.4.3"
language    = "rust"
description = "Voice activity detection (Silero VAD ONNX) + SpeculativeVADCoordinator — standalone Rust cdylib plugin"

[rust]
node_types    = ["SileroVADNode", "SpeculativeVADCoordinator"]
asset_pattern = "lib{name}-{arch}-{os}.{ext}"
